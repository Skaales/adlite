name: Build and deploy adlite

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs under load; that's fine
    # for a personal news mirror. Tighten/loosen as you like.
    - cron: '*/30 * * * *'
  workflow_dispatch:      # lets you trigger a build by hand from the Actions tab
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show PHP version
        run: php -v

      - name: Generate the text-only site
        run: php src/adlite.php

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
